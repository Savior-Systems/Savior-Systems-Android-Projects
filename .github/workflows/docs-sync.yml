name: Savior Systems Documentation Sync

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'CONTRIBUTORS.md'
      - 'ACTIVITY.md'
      - 'PROGRESS.md'
      - 'README.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Ensure write permissions to push updated docs back to the repository
permissions:
  contents: write

# Prevent concurrent runs on the same branch from causing push conflicts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest
    name: Validate, Sync & Update
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so git log command can accurately construct CHANGELOG.md and CONTRIBUTORS.md
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint and Validate Python Scripts
        run: |
          python -m py_compile scripts/*.py
          echo "✅ All Python scripts successfully validated and compiled without syntax errors."

      - name: Run Documentation & Progress Sync
        run: |
          python scripts/update_changelog.py
        env:
          PYTHONPATH: scripts

      - name: Generate GitHub Job Summary
        run: |
          echo "# Documentation Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "Here is the current documentation progress snapshot generated by this run:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Append the first 25 lines of PROGRESS.md containing the summary
          head -n 25 PROGRESS.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For the detailed status breakdown, see [PROGRESS.md](PROGRESS.md)." >> $GITHUB_STEP_SUMMARY

      - name: Check for Changes
        id: git-status
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.git-status.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md CONTRIBUTORS.md ACTIVITY.md PROGRESS.md README.md
          git add "*/README.md" "*/*.md" 2>/dev/null || true
          
          git commit -m "docs(chore): auto-update changelog, progress tracker, and navigation panels [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
